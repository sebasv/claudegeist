<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude session word cloud</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
  header { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding: 12px 20px; border-bottom: 1px solid #21262d; }
  h1 { font-size: 15px; margin: 0 12px 0 0; font-weight: 600; }
  label { font-size: 12px; color: #8b949e; margin-right: 4px; }
  select, button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; }
  button:hover, select:hover { border-color: #58a6ff; }
  #date { font-size: 22px; font-weight: 700; color: #58a6ff; min-width: 160px; text-align: center; }
  #scrub { flex: 1; min-width: 200px; }
  #cloud { display: block; }
  #cloud text { font-family: system-ui, sans-serif; font-weight: 600; cursor: default; }
  .grp { display: flex; align-items: center; gap: 4px; }
  #status { position: fixed; bottom: 10px; left: 20px; font-size: 12px; color: #8b949e; }
</style>
</head>
<body>
<header>
  <h1>Claude session word cloud</h1>
  <div class="grp">
    <label>source</label>
    <select id="channel"></select>
  </div>
  <div class="grp">
    <label>metric</label>
    <select id="metric">
      <option value="tfidf">distinctive (tf-idf)</option>
      <option value="raw">frequency (raw)</option>
    </select>
  </div>
  <button id="play">▶ play</button>
  <div class="grp">
    <label>speed</label>
    <select id="speed">
      <option value="2000">slow</option>
      <option value="1200" selected>medium</option>
      <option value="600">fast</option>
    </select>
  </div>
  <input id="scrub" type="range" min="0" value="0">
  <div id="date">—</div>
</header>
<svg id="cloud"></svg>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.7/build/d3.layout.cloud.js"></script>
<script src="buckets.js"></script>
<script>
const B = window.BUCKETS;
const channelSel = document.getElementById('channel');
const metricSel  = document.getElementById('metric');
const scrub      = document.getElementById('scrub');
const dateEl     = document.getElementById('date');
const playBtn    = document.getElementById('play');
const speedSel   = document.getElementById('speed');
const statusEl   = document.getElementById('status');
const svg        = d3.select('#cloud');

const FONT_MIN = 12, FONT_MAX = 90;   // px range for both layout sizing and live sizing
const TOP_WORDS = 120;                // cap words per layout for readability

B.channels.forEach(c => channelSel.add(new Option(c, c)));
scrub.max = B.buckets.length - 1;

let timer = null;
let layoutCache = {};   // "channel|metric" -> { words:[{text,x,y,rotate,maxWeight}], globalMax }
let gNode = null;       // the centered <g> currently bound
let currentKey = null;

// ── geometry ──────────────────────────────────────────────────────────────
function cloudSize() {
  const headerH = document.querySelector('header').offsetHeight;
  return [window.innerWidth, Math.max(120, window.innerHeight - headerH)];
}

// stable hue per word so colours don't flicker between frames
function colorFor(word) {
  let h = 0;
  for (const ch of word) h = (h * 31 + ch.charCodeAt(0)) % 360;
  return `hsl(${h}, 65%, 62%)`;
}

// ── data helpers ────────────────────────────────────────────────────────────
// max weight per word across all frames for a channel+metric, plus global max
function aggregate(channel, metric) {
  const frames = B.data[channel] || [];
  const maxByWord = new Map();
  for (const frame of frames) {
    const list = (frame && frame[metric]) || [];
    for (const [w, v] of list) {
      const prev = maxByWord.get(w);
      if (prev === undefined || v > prev) maxByWord.set(w, v);
    }
  }
  let words = [...maxByWord.entries()].map(([text, maxWeight]) => ({ text, maxWeight }));
  words.sort((a, b) => b.maxWeight - a.maxWeight);
  words = words.slice(0, TOP_WORDS);
  const globalMax = words.length ? words[0].maxWeight : 1;
  return { words, globalMax };
}

// sqrt scale of weight -> font-size px, comparable across time via globalMax
function fontSize(weight, globalMax) {
  if (globalMax <= 0) return FONT_MIN;
  return FONT_MIN + (FONT_MAX - FONT_MIN) * Math.sqrt(weight / globalMax);
}

// per-frame weight lookup for the current channel+metric
function frameWeights(channel, metric, i) {
  const frame = (B.data[channel] || [])[i] || {};
  const list = frame[metric] || [];
  const m = new Map();
  for (const [w, v] of list) m.set(w, v);
  return m;
}

// ── layout (async, cached) ───────────────────────────────────────────────────
function buildLayout(channel, metric) {
  const key = channel + '|' + metric;
  return new Promise(resolve => {
    if (layoutCache[key]) { resolve(layoutCache[key]); return; }
    const { words, globalMax } = aggregate(channel, metric);
    const [w, h] = cloudSize();
    if (!words.length) {
      const empty = { words: [], globalMax };
      layoutCache[key] = empty;
      resolve(empty);
      return;
    }
    statusEl.textContent = 'computing layout…';
    // size each word by its MAX weight so the layout reserves room for its peak
    const sized = words.map(d => ({
      text: d.text,
      maxWeight: d.maxWeight,
      size: fontSize(d.maxWeight, globalMax),
    }));
    d3.layout.cloud()
      .size([w, h])
      .words(sized)
      .padding(2)
      .rotate(() => (Math.random() < 0.25 ? 90 : 0))
      .font('system-ui, sans-serif')
      .fontWeight(600)
      .fontSize(d => d.size)
      .on('end', placed => {
        const laidOut = placed.map(d => ({
          text: d.text,
          x: d.x,
          y: d.y,
          rotate: d.rotate,
          maxWeight: d.maxWeight,
        }));
        const result = { words: laidOut, globalMax };
        layoutCache[key] = result;
        statusEl.textContent = '';
        resolve(result);
      })
      .start();
  });
}

// ── render: one <text> per layout word, entered once ─────────────────────────
async function rebuild() {
  const channel = channelSel.value, metric = metricSel.value;
  const key = channel + '|' + metric;
  currentKey = key;
  const layout = await buildLayout(channel, metric);
  if (currentKey !== key) return; // a newer rebuild superseded us

  const [w, h] = cloudSize();
  svg.attr('width', w).attr('height', h);
  svg.selectAll('g').remove();
  gNode = svg.append('g').attr('transform', `translate(${w / 2},${h / 2})`);

  gNode.selectAll('text')
    .data(layout.words, d => d.text)
    .join('text')
      .attr('text-anchor', 'middle')
      .attr('transform', d => `translate(${d.x},${d.y}) rotate(${d.rotate})`)
      .attr('fill', d => colorFor(d.text))
      .style('font-size', '0px')
      .style('opacity', 0)
      .text(d => d.text);

  updateFrame(+scrub.value);
}

// ── morph to frame i: resize / fade in place, never reposition ────────────────
function updateFrame(i) {
  dateEl.textContent = B.buckets[i] || '—';
  if (!gNode) return;
  const layout = layoutCache[currentKey];
  if (!layout) return;
  const weights = frameWeights(channelSel.value, metricSel.value, i);
  const globalMax = layout.globalMax;
  const dur = Math.min((+speedSel.value) * 0.8, 900);

  gNode.selectAll('text')
    .transition()
    .duration(dur)
    .ease(d3.easeCubicInOut)
    .style('font-size', d => {
      const v = weights.get(d.text);
      return (v === undefined ? 0 : fontSize(v, globalMax)) + 'px';
    })
    .style('opacity', d => (weights.get(d.text) === undefined ? 0 : 1));
}

// ── playback / controls ───────────────────────────────────────────────────
function step() {
  scrub.value = (+scrub.value + 1) % B.buckets.length;
  updateFrame(+scrub.value);
}

function togglePlay() {
  if (timer) {
    clearInterval(timer);
    timer = null;
    playBtn.textContent = '▶ play';
  } else {
    playBtn.textContent = '❚❚ pause';
    step();
    timer = setInterval(step, +speedSel.value);
  }
}

playBtn.onclick = togglePlay;
scrub.oninput = () => updateFrame(+scrub.value);
channelSel.onchange = rebuild;
metricSel.onchange  = rebuild;
speedSel.onchange = () => { if (timer) { togglePlay(); togglePlay(); } };
window.onresize = () => { layoutCache = {}; rebuild(); };

rebuild();
</script>
</body>
</html>
