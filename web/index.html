<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claudegeist</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
  header { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding: 12px 20px; border-bottom: 1px solid #21262d; }
  h1 { font-size: 15px; margin: 0 12px 0 0; font-weight: 600; }
  label { font-size: 12px; color: #8b949e; margin-right: 4px; }
  select, button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; }
  button:hover, select:hover { border-color: #58a6ff; }
  #date { font-size: 22px; font-weight: 700; color: #58a6ff; min-width: 160px; text-align: center; }
  #scrub { flex: 1; min-width: 200px; }
  #cloud { display: block; }
  #cloud text { font-family: system-ui, sans-serif; font-weight: 600; cursor: default; }
  .grp { display: flex; align-items: center; gap: 4px; }
  #status { position: fixed; bottom: 10px; left: 20px; font-size: 12px; color: #8b949e; }
</style>
</head>
<body>
<header>
  <h1>claudegeist</h1>
  <div class="grp">
    <label>source</label>
    <select id="channel"></select>
  </div>
  <div class="grp">
    <label>metric</label>
    <select id="metric">
      <option value="tfidf">distinctive (tf-idf)</option>
      <option value="raw">frequency (raw)</option>
    </select>
  </div>
  <div class="grp">
    <label>bucket</label>
    <select id="gran"></select>
  </div>
  <button id="play">▶ play</button>
  <div class="grp">
    <label>speed</label>
    <select id="speed">
      <option value="5000">slow</option>
      <option value="2600" selected>medium</option>
      <option value="1200">fast</option>
    </select>
  </div>
  <input id="scrub" type="range" min="0" step="0.001" value="0">
  <div id="date">—</div>
</header>
<svg id="cloud"></svg>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.7/build/d3.layout.cloud.js"></script>
<script src="buckets.js"></script>
<script>
const B = window.BUCKETS;
const channelSel = document.getElementById('channel');
const metricSel  = document.getElementById('metric');
const granSel    = document.getElementById('gran');
const scrub      = document.getElementById('scrub');
const dateEl     = document.getElementById('date');
const playBtn    = document.getElementById('play');
const speedSel   = document.getElementById('speed');
const statusEl   = document.getElementById('status');
const svg        = d3.select('#cloud');

const FONT_MIN = 12, FONT_MAX = 90;   // px range for layout sizing
const TOP_WORDS = 120;                // cap words per layout for readability

B.channels.forEach(c => channelSel.add(new Option(c, c)));
B.granularities.forEach(g => granSel.add(new Option(g, g)));
granSel.value = B.default;

let layoutCache = {};   // "gran|channel|metric" -> { words:[{text,x,y,rotate}], globalMax }
let frameMaps = [];     // per-bucket Map(word -> weight) for the current selection
let gNode = null;       // the centered <g> currently bound
let currentKey = null;
let pos = 0;            // fractional playhead in [0, nBuckets-1]
let playing = false, rafId = null, lastT = 0;

// ── selected dataset ─────────────────────────────────────────────────────────
const curSet     = () => B.sets[granSel.value];
const curBuckets = () => curSet().buckets;
const selKey     = () => granSel.value + '|' + channelSel.value + '|' + metricSel.value;

// ── geometry ──────────────────────────────────────────────────────────────
function cloudSize() {
  const headerH = document.querySelector('header').offsetHeight;
  return [window.innerWidth, Math.max(120, window.innerHeight - headerH)];
}

// stable hue per word so colours don't flicker between frames
function colorFor(word) {
  let h = 0;
  for (const ch of word) h = (h * 31 + ch.charCodeAt(0)) % 360;
  return `hsl(${h}, 65%, 62%)`;
}

// ── data helpers ────────────────────────────────────────────────────────────
// max weight per word across all frames for the selection, plus global max
function aggregate(channel, metric) {
  const frames = curSet().data[channel] || [];
  const maxByWord = new Map();
  for (const frame of frames) {
    for (const [w, v] of (frame && frame[metric]) || []) {
      const prev = maxByWord.get(w);
      if (prev === undefined || v > prev) maxByWord.set(w, v);
    }
  }
  let words = [...maxByWord.entries()].map(([text, maxWeight]) => ({ text, maxWeight }));
  words.sort((a, b) => b.maxWeight - a.maxWeight);
  words = words.slice(0, TOP_WORDS);
  return { words, globalMax: words.length ? words[0].maxWeight : 1 };
}

// layout sizing: sqrt scale into [FONT_MIN, FONT_MAX], reserving room for a peak
function layoutSize(weight, globalMax) {
  if (globalMax <= 0) return FONT_MIN;
  return FONT_MIN + (FONT_MAX - FONT_MIN) * Math.sqrt(weight / globalMax);
}
// live sizing: scales from 0 so words shrink to nothing as their weight decays;
// always <= the layout size at the same weight, so it never overflows its slot.
function liveSize(weight, globalMax) {
  if (globalMax <= 0 || weight <= 0) return 0;
  return FONT_MAX * Math.sqrt(weight / globalMax);
}

function buildFrameMaps(channel, metric) {
  return curSet().data[channel].map(frame => {
    const m = new Map();
    for (const [w, v] of (frame && frame[metric]) || []) m.set(w, v);
    return m;
  });
}

// ── layout (async, cached) ───────────────────────────────────────────────────
function buildLayout(channel, metric) {
  const key = selKey();
  return new Promise(resolve => {
    if (layoutCache[key]) { resolve(layoutCache[key]); return; }
    const { words, globalMax } = aggregate(channel, metric);
    const [w, h] = cloudSize();
    if (!words.length) { resolve(layoutCache[key] = { words: [], globalMax }); return; }
    statusEl.textContent = 'computing layout...';
    const sized = words.map(d => ({ text: d.text, size: layoutSize(d.maxWeight, globalMax) }));
    d3.layout.cloud()
      .size([w, h])
      .words(sized)
      .padding(2)
      .rotate(() => (Math.random() < 0.25 ? 90 : 0))
      .font('system-ui, sans-serif')
      .fontWeight(600)
      .fontSize(d => d.size)
      .on('end', placed => {
        const laidOut = placed.map(d => ({ text: d.text, x: d.x, y: d.y, rotate: d.rotate }));
        statusEl.textContent = '';
        resolve(layoutCache[key] = { words: laidOut, globalMax });
      })
      .start();
  });
}

// ── render: one <text> per layout word, entered once ─────────────────────────
async function rebuild() {
  const channel = channelSel.value, metric = metricSel.value;
  const key = selKey();
  currentKey = key;
  const layout = await buildLayout(channel, metric);
  if (currentKey !== key) return; // a newer rebuild superseded us

  frameMaps = buildFrameMaps(channel, metric);
  const n = curBuckets().length;
  scrub.max = Math.max(0, n - 1);
  if (pos > n - 1) pos = 0;

  const [w, h] = cloudSize();
  svg.attr('width', w).attr('height', h);
  svg.selectAll('g').remove();
  gNode = svg.append('g').attr('transform', `translate(${w / 2},${h / 2})`);

  gNode.selectAll('text')
    .data(layout.words, d => d.text)
    .join('text')
      .attr('text-anchor', 'middle')
      .attr('transform', d => `translate(${d.x},${d.y}) rotate(${d.rotate})`)
      .attr('fill', d => colorFor(d.text))
      .style('font-size', '0px')
      .style('opacity', 0)
      .text(d => d.text);

  renderAt(pos);
}

// ── continuous render at fractional time `p`: lerp weights between buckets ─────
function renderAt(p) {
  const buckets = curBuckets();
  const n = buckets.length;
  if (!gNode || !n) return;
  const globalMax = (layoutCache[currentKey] || {}).globalMax || 1;
  const i0 = Math.floor(p), i1 = Math.min(i0 + 1, n - 1), frac = p - i0;
  const m0 = frameMaps[i0] || new Map(), m1 = frameMaps[i1] || new Map();

  dateEl.textContent = buckets[Math.round(p)] || '—';
  scrub.value = p;

  gNode.selectAll('text').each(function (d) {
    const w0 = m0.get(d.text) || 0, w1 = m1.get(d.text) || 0;
    const size = liveSize(w0 + (w1 - w0) * frac, globalMax);
    this.style.fontSize = size + 'px';
    this.style.opacity = Math.min(1, size / FONT_MIN);  // fade only in the last few px
  });
}

// ── playback: rAF loop advancing the playhead by real elapsed time ────────────
function tick(now) {
  if (!playing) return;
  const n = curBuckets().length;
  const dt = now - lastT; lastT = now;
  if (n > 1) {
    pos += (dt / (+speedSel.value)) * 1;   // speed = ms per bucket
    while (pos > n - 1) pos -= (n - 1);     // loop back to the start
  } else {
    pos = 0;
  }
  renderAt(pos);
  rafId = requestAnimationFrame(tick);
}

function togglePlay() {
  playing = !playing;
  playBtn.textContent = playing ? '❚❚ pause' : '▶ play';
  if (playing) { lastT = performance.now(); rafId = requestAnimationFrame(tick); }
  else if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

playBtn.onclick = togglePlay;
scrub.oninput = () => { pos = +scrub.value; renderAt(pos); };
channelSel.onchange = rebuild;
metricSel.onchange  = rebuild;
granSel.onchange    = rebuild;
speedSel.onchange = () => {};   // picked up live by the next tick
window.onresize = () => { layoutCache = {}; rebuild(); };

rebuild();
</script>
</body>
</html>
